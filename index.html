<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ilha do Templo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; overflow:hidden; font-family:monospace; }
canvas { display:block; }
#ui {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%);
  color:rgba(255,255,255,0.85); font-size:12px; text-align:center;
  background:rgba(0,0,0,0.5); padding:7px 18px; border-radius:20px;
  pointer-events:none; letter-spacing:1px;
}
#crosshair {
  position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
  width:14px; height:14px; pointer-events:none; display:none;
}
#crosshair::before,#crosshair::after {
  content:''; position:absolute; background:rgba(255,255,255,0.9);
}
#crosshair::before { width:2px; height:100%; left:50%; transform:translateX(-50%); }
#crosshair::after  { height:2px; width:100%; top:50%; transform:translateY(-50%); }
#overlay {
  position:fixed; top:0; left:0; width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  background:rgba(0,0,0,0.55); cursor:pointer; z-index:10;
}
#overlay-box {
  color:white; font-size:20px; text-align:center;
  background:rgba(0,0,0,0.7); padding:24px 44px; border-radius:14px;
  border:1px solid rgba(255,255,255,0.25); line-height:2.2;
}
#flymode {
  position:fixed; top:16px; right:16px;
  color:rgba(255,255,255,0.9); font-size:12px;
  background:rgba(0,0,0,0.55); padding:6px 14px; border-radius:10px;
  pointer-events:none; letter-spacing:1px;
}
</style>
</head>
<body>
<div id="overlay">
  <div id="overlay-box">
    🏝️ Clique para explorar a ilha<br>
    <span style="font-size:13px;opacity:0.75">
      WASD — mover &nbsp;|&nbsp; Mouse — olhar<br>
      F — voar / andar &nbsp;|&nbsp; SPACE — subir (voando)<br>
      SHIFT — descer (voando) &nbsp;|&nbsp; ESC — sair
    </span>
  </div>
</div>
<div id="crosshair"></div>
<div id="flymode">🚶 ANDAR</div>
<div id="ui">WASD — mover &nbsp;|&nbsp; Mouse — olhar &nbsp;|&nbsp; F — voar &nbsp;|&nbsp; ESC — sair</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x87ceeb, 0.011);
scene.background = new THREE.Color(0x87ceeb);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(72, innerWidth/innerHeight, 0.05, 900);
camera.position.set(0, 5, 38);

// Lights
const sun = new THREE.DirectionalLight(0xfff0d0, 2.8);
sun.position.set(100, 150, 80);
sun.castShadow = true;
sun.shadow.mapSize.set(4096, 4096);
sun.shadow.camera.near = 1; sun.shadow.camera.far = 450;
sun.shadow.camera.left = sun.shadow.camera.bottom = -150;
sun.shadow.camera.right = sun.shadow.camera.top = 150;
scene.add(sun);
scene.add(new THREE.AmbientLight(0xbbd5ff, 0.85));
scene.add(new THREE.HemisphereLight(0x87ceeb, 0x4a8a2a, 0.55));

// Terrain
function islandH(x, z) {
  const d = Math.sqrt(x*x + z*z);
  if (d > 65) return -3;
  let h = Math.max(0, 1 - d/60);
  h = Math.pow(h, 0.55) * 16;
  h += Math.sin(x*0.16)*Math.cos(z*0.19)*2.0;
  h += Math.sin(x*0.32+1)*Math.sin(z*0.26+2)*1.2;
  h += Math.cos(x*0.55)*Math.cos(z*0.50)*0.6;
  // flatten for temple
  const td = Math.sqrt(x*x + (z+5)*(z+5));
  if (td < 20) h = Math.max(h, 7.5 + (1-td/20)*4);
  return h;
}

const tGeo = new THREE.PlaneGeometry(270, 270, 320, 320);
tGeo.rotateX(-Math.PI/2);
const tp = tGeo.attributes.position;
for (let i=0; i<tp.count; i++) tp.setY(i, islandH(tp.getX(i), tp.getZ(i)));
tGeo.computeVertexNormals();
const tcols = [];
for (let i=0; i<tp.count; i++){
  const y=tp.getY(i), x=tp.getX(i), z=tp.getZ(i), d=Math.sqrt(x*x+z*z);
  let r,g,b;
  if(d>58||y<0.5){r=0.85;g=0.75;b=0.55;}
  else if(y<4){r=0.22;g=0.58;b=0.18;}
  else if(y<9){r=0.18;g=0.50;b=0.15;}
  else{r=0.42;g=0.34;b=0.23;}
  tcols.push(r,g,b);
}
tGeo.setAttribute('color', new THREE.Float32BufferAttribute(tcols, 3));
const terrain = new THREE.Mesh(tGeo, new THREE.MeshLambertMaterial({vertexColors:true}));
terrain.receiveShadow = true;
scene.add(terrain);

// Ocean
const wU = { uTime:{value:0} };
const oceanMat = new THREE.ShaderMaterial({
  uniforms: wU,
  vertexShader:`uniform float uTime; varying float vH;
    void main(){
      vec3 p=position;
      p.y=sin(p.x*0.13+uTime*1.1)*0.5+sin(p.z*0.10+uTime*0.85)*0.4+sin(length(p.xz)*0.035-uTime*0.6)*0.3;
      vH=p.y; gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);}`,
  fragmentShader:`varying float vH;
    void main(){
      float t=clamp(vH*0.7+0.5,0.0,1.0);
      vec3 c=mix(vec3(0.0,0.47,0.67),vec3(0.0,0.77,0.91),t);
      c=mix(c,vec3(1.0),smoothstep(0.28,0.52,vH)*0.42);
      gl_FragColor=vec4(c,1.0);}`,
  side: THREE.DoubleSide
});
const ocean = new THREE.Mesh(new THREE.PlaneGeometry(900,900,210,210), oceanMat);
ocean.rotation.x = -Math.PI/2; ocean.position.y = -0.5;
scene.add(ocean);

// Materials
const mW  = new THREE.MeshLambertMaterial({color:0xf2ede5});
const mBl = new THREE.MeshLambertMaterial({color:0x1a4fcc});
const mGo = new THREE.MeshLambertMaterial({color:0xcb8f10});
const mBr = new THREE.MeshLambertMaterial({color:0x7a4418});
const mDk = new THREE.MeshLambertMaterial({color:0x221e14});
const mCr = new THREE.MeshLambertMaterial({color:0xece5d0});
const mRd = new THREE.MeshLambertMaterial({color:0xbb1e1e});
const mCo = new THREE.MeshLambertMaterial({color:0xdad5c8});
const mGl = new THREE.MeshLambertMaterial({color:0x2a3a5a,transparent:true,opacity:0.65});

function box(w,h,d,mat,px,py,pz,par){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat);
  m.position.set(px,py,pz);
  m.castShadow=true; m.receiveShadow=true;
  (par||scene).add(m); return m;
}

// Temple world position
const TX=0, TZ=-5;
const TY=islandH(TX,TZ);

const TG = new THREE.Group();
TG.position.set(TX, TY, TZ);
scene.add(TG);

// Courtyard slab
box(44,0.5,38,mCo, 0,0.25, 2, TG);

// Steps (3 levels)
for(let i=0;i<3;i++) box(20,0.45,2,mCr, 0,0.6+i*0.45, 12-i*2, TG);

// Labyrinth pattern left side
box(13,0.06,13,mCr, -13,0.52, 3, TG);
for(let i=0;i<5;i++) box(13,0.09,0.9,mRd,-13,0.57,-4+i*2.1,TG);
for(let i=0;i<4;i++) box(0.9,0.09,13,mRd,-17+i*2.1,0.57,3,TG);
box(0.9,0.1,7,mRd,-13,0.58,3,TG); box(7,0.1,0.9,mRd,-13,0.58,3,TG);

// Benches
function bench(px,pz,ry,par){
  const g=new THREE.Group();
  box(3.8,0.18,0.85,mCr, 0,0.44,0, g);
  box(3.8,0.36,0.12,mCr, 0,0.26,-0.36, g);
  box(0.18,0.36,0.85,mCr,-1.7,0.24,0, g);
  box(0.18,0.36,0.85,mCr, 1.7,0.24,0, g);
  g.position.set(px,0,pz); g.rotation.y=ry;
  (par||TG).add(g);
}
bench(-8,14,0); bench(8,14,0);
bench(-14,2,Math.PI/2); bench(14,2,Math.PI/2);
bench(-14,-4,Math.PI/2); bench(14,-4,Math.PI/2);

// Temple plinth
box(19,1.3,15,mCr, 0,1.65,-1, TG);

// Wall constants
const WT=0.9, BW=16, BD=13, BH=11, BY=2.95;
const DW=8.5; // door opening width

// Walls (hollow box - 4 walls)
// Back wall (solid)
box(BW,BH,WT, mW, 0,BY+BH/2,-BD/2-1+WT/2, TG);
// Left wall
box(WT,BH,BD, mW, -BW/2+WT/2,BY+BH/2,-1, TG);
// Right wall
box(WT,BH,BD, mW,  BW/2-WT/2,BY+BH/2,-1, TG);
// Front wall left segment
box((BW-DW)/2,BH,WT, mW, -(DW/2+(BW-DW)/4), BY+BH/2, BD/2-1+WT/2, TG);
// Front wall right segment
box((BW-DW)/2,BH,WT, mW,  (DW/2+(BW-DW)/4), BY+BH/2, BD/2-1+WT/2, TG);
// Front wall above door
box(DW,BH-7.8,WT, mW, 0, BY+BH-3, BD/2-1+WT/2, TG);
// Ceiling
box(BW,WT,BD, mW, 0, BY+BH+WT/2,-1, TG);
// Floor inside
box(BW-WT*2,0.25,BD-WT*2, mCo, 0,BY+0.12,-1, TG);

// Blue horizontal stripes - all 4 faces
for(let i=0;i<7;i++){
  const sy=BY+0.75+i*1.45;
  // back
  box(BW+0.08,0.5,WT+0.06,mBl, 0,sy,-BD/2-1+WT/2, TG);
  // left
  box(WT+0.06,0.5,BD+0.08,mBl, -BW/2+WT/2,sy,-1, TG);
  // right
  box(WT+0.06,0.5,BD+0.08,mBl,  BW/2-WT/2,sy,-1, TG);
  // front left+right
  box((BW-DW)/2+0.06,0.5,WT+0.06,mBl,-(DW/2+(BW-DW)/4),sy,BD/2-1+WT/2,TG);
  box((BW-DW)/2+0.06,0.5,WT+0.06,mBl, (DW/2+(BW-DW)/4),sy,BD/2-1+WT/2,TG);
  if(sy>BY+BH-4) box(DW+0.06,0.5,WT+0.06,mBl,0,sy,BD/2-1+WT/2,TG);
}

// Vertical blue stripes - corners and center verticals
const vStripes=[
  [BW/2-WT/2,BD/2-1+WT/2],[BW/2-WT/2,-BD/2-1+WT/2],
  [-BW/2+WT/2,BD/2-1+WT/2],[-BW/2+WT/2,-BD/2-1+WT/2]
];
vStripes.forEach(([sx,sz])=>{
  box(0.55,BH+0.1,WT+0.1,mBl,sx,BY+BH/2,sz,TG);
});
box(WT+0.1,BH+0.1,0.55,mBl,-BW/2+WT/2,BY+BH/2,1,TG);
box(WT+0.1,BH+0.1,0.55,mBl, BW/2-WT/2,BY+BH/2,1,TG);

// Brown arch surround - front
box(0.75,7.8,WT+0.3,mBr,-DW/2+0.3,BY+4.2,BD/2-1+WT/2,TG);
box(0.75,7.8,WT+0.3,mBr, DW/2-0.3,BY+4.2,BD/2-1+WT/2,TG);
box(DW,1.4,WT+0.3,mBr,0,BY+8.5,BD/2-1+WT/2,TG);
// arch top
const arch1=new THREE.Mesh(new THREE.CylinderGeometry(4.3,4.3,WT+0.3,18,1,false,0,Math.PI),mBr);
arch1.rotation.x=Math.PI/2; arch1.rotation.z=Math.PI;
arch1.position.set(0,BY+8,BD/2-1+WT/2); arch1.castShadow=true; TG.add(arch1);

// Door panels
box(3.8,7.6,0.22,mBr,-2.0,BY+3.8,BD/2-1+WT/2+0.17,TG);
box(3.8,7.6,0.22,mBr, 2.0,BY+3.8,BD/2-1+WT/2+0.17,TG);
// door handles
box(0.15,0.9,0.28,mDk,-0.9,BY+4.0,BD/2-1+WT/2+0.29,TG);
box(0.15,0.9,0.28,mDk, 0.9,BY+4.0,BD/2-1+WT/2+0.29,TG);
// door crossbars
box(3.8,0.2,0.18,mDk,-2.0,BY+5.5,BD/2-1+WT/2+0.2,TG);
box(3.8,0.2,0.18,mDk, 2.0,BY+5.5,BD/2-1+WT/2+0.2,TG);
box(3.8,0.2,0.18,mDk,-2.0,BY+2.5,BD/2-1+WT/2+0.2,TG);
box(3.8,0.2,0.18,mDk, 2.0,BY+2.5,BD/2-1+WT/2+0.2,TG);

// Back window arch (brown)
box(0.6,5.5,WT+0.3,mBr,-2.8,BY+3.5,-BD/2-1+WT/2,TG);
box(0.6,5.5,WT+0.3,mBr, 2.8,BY+3.5,-BD/2-1+WT/2,TG);
box(6.2,1.2,WT+0.3,mBr,0,BY+7,-BD/2-1+WT/2,TG);
const arch2=new THREE.Mesh(new THREE.CylinderGeometry(3.2,3.2,WT+0.3,18,1,false,0,Math.PI),mBr);
arch2.rotation.x=Math.PI/2; arch2.rotation.z=Math.PI;
arch2.position.set(0,BY+6.5,-BD/2-1+WT/2); arch2.castShadow=true; TG.add(arch2);
box(5.5,5.5,0.12,mGl,0,BY+3.7,-BD/2-1+WT/2,TG);

// Side windows (smaller)
for(let sx of[-BW/2+WT/2, BW/2-WT/2]){
  const sign=sx<0?-1:1;
  box(WT+0.3,4.2,3.5,mBr,sx,BY+4,-1,TG);
  box(WT+0.12,4.0,3.0,mGl,sx,BY+4,-1,TG);
}

// Interior - altar
box(3.2,0.8,3.2,mCr, 0,BY+0.4,-BD/2+3.5, TG);
box(2.2,1.5,2.2,mCr, 0,BY+1.5,-BD/2+3.5, TG);
// torches
for(let sx of[-3,3]){
  box(0.18,1.3,0.18,mCr,sx,BY+0.65,-BD/2+4.5,TG);
  const fm=new THREE.MeshLambertMaterial({color:0xff8800,emissive:0xff5500,emissiveIntensity:1.2});
  const fb=new THREE.Mesh(new THREE.SphereGeometry(0.18,6,6),fm);
  fb.position.set(sx,BY+1.5,-BD/2+4.5+TY); // world offset applied via group
  fb.position.set(sx,BY+1.5,-BD/2+4.5);
  TG.add(fb);
  const pl=new THREE.PointLight(0xff6600,1.0,7);
  pl.position.set(sx,BY+1.6,-BD/2+4.5); TG.add(pl);
}

// Roof parapet
box(BW+1.2,0.75,WT+0.1,mW,0,BY+BH+1.2,-BD/2-1+WT/2,TG);
box(BW+1.2,0.75,WT+0.1,mW,0,BY+BH+1.2, BD/2-1+WT/2,TG);
box(WT+0.1,0.75,BD+1.2,mW,-BW/2-0.4,BY+BH+1.2,-1,TG);
box(WT+0.1,0.75,BD+1.2,mW, BW/2+0.4,BY+BH+1.2,-1,TG);
box(BW+0.08,0.45,BD+0.08,mBl,0,BY+BH+0.55,-1,TG);

// Flagpole
box(0.22,5,0.22,mDk,0,BY+BH+4,-1,TG);

// Colliders (world space AABB)
const colliders=[];
function addC(minX,minY,minZ,maxX,maxY,maxZ){
  colliders.push({minX,minY,minZ,maxX,maxY,maxZ});
}
const ox=TX, oy=TY, oz=TZ;
// back wall
addC(ox-BW/2-0.2,oy-1,oz-BD/2-1+WT-0.2, ox+BW/2+0.2,oy+20, oz-BD/2-1+WT+0.5);
// left wall
addC(ox-BW/2-0.4,oy-1,oz-BD/2-2, ox-BW/2+WT+0.2,oy+20, oz+BD/2+2);
// right wall
addC(ox+BW/2-WT-0.2,oy-1,oz-BD/2-2, ox+BW/2+0.4,oy+20, oz+BD/2+2);
// front wall left
addC(ox-BW/2-0.2,oy-1,oz+BD/2-1-0.5, ox-DW/2+0.1,oy+20, oz+BD/2+0.6);
// front wall right
addC(ox+DW/2-0.1,oy-1,oz+BD/2-1-0.5, ox+BW/2+0.2,oy+20, oz+BD/2+0.6);
// plinth exterior blocking
addC(ox-10,oy-0.5,oz-9, ox+10,oy+2.0, oz+7.5);

// Palms
function palm(x,z){
  const h=islandH(x,z); if(h<0.4) return;
  const g=new THREE.Group();
  const tH=5.5+Math.random()*2.5;
  const tr=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.27,tH,8),new THREE.MeshLambertMaterial({color:0x6e4f2e}));
  tr.position.y=tH/2; tr.rotation.z=(Math.random()-0.5)*0.22; tr.castShadow=true; g.add(tr);
  const lm=new THREE.MeshLambertMaterial({color:0x256e18,side:THREE.DoubleSide});
  for(let i=0;i<8;i++){
    const lk=new THREE.Mesh(new THREE.ConeGeometry(0.1,4+Math.random(),5),lm);
    lk.castShadow=true;
    const a=(i/8)*Math.PI*2;
    lk.position.set(Math.cos(a)*1.4,tH+0.5,Math.sin(a)*1.4);
    lk.rotation.z=Math.PI/2.2; lk.rotation.y=a; g.add(lk);
  }
  g.position.set(x,h,z); scene.add(g);
}
[[20,0],[24,13],[-19,6],[17,-23],[24,-10],[-22,-14],[10,28],[-8,31],
 [32,5],[-30,2],[7,-41],[37,-20],[30,24],[-27,21],[15,37],[-17,-32],
 [42,7],[-40,12],[10,-44],[44,-17],[40,27],[-37,24],[4,4],[-5,8],[3,-13],
 [28,-28],[18,40],[-28,18],[50,0],[-48,5]
].forEach(([x,z])=>palm(x,z));

// Rocks
const rmat=new THREE.MeshLambertMaterial({color:0x5c574b});
for(let i=0;i<45;i++){
  const a=Math.random()*Math.PI*2, d=25+Math.random()*40;
  const rx=Math.cos(a)*d, rz=Math.sin(a)*d;
  const rh=islandH(rx,rz); if(rh<0.1) continue;
  const s=0.3+Math.random()*1.5;
  const rm=new THREE.Mesh(new THREE.DodecahedronGeometry(s,0),rmat);
  rm.position.set(rx,rh+s*0.3,rz);
  rm.rotation.set(Math.random()*6,Math.random()*6,Math.random()*6);
  rm.castShadow=true; scene.add(rm);
}

// Bushes
const bmat=new THREE.MeshLambertMaterial({color:0x286014});
for(let i=0;i<40;i++){
  const a=Math.random()*Math.PI*2, d=6+Math.random()*54;
  const bx=Math.cos(a)*d, bz=Math.sin(a)*d;
  const bh=islandH(bx,bz); if(bh<1||bh>13) continue;
  const bs=0.5+Math.random()*1.2;
  const bm=new THREE.Mesh(new THREE.SphereGeometry(bs,7,6),bmat);
  bm.position.set(bx,bh+bs*0.45,bz); bm.castShadow=true; scene.add(bm);
}

// Sky
const skyMat=new THREE.ShaderMaterial({
  side:THREE.BackSide,
  vertexShader:`varying vec3 vP; void main(){vP=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
  fragmentShader:`varying vec3 vP; void main(){
    float t=clamp((vP.y+100.0)/420.0,0.0,1.0);
    gl_FragColor=vec4(mix(vec3(0.55,0.82,0.95),vec3(0.14,0.37,0.76),t),1.0);}`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(600,32,16),skyMat));

// Clouds
const cmat=new THREE.MeshLambertMaterial({color:0xffffff,transparent:true,opacity:0.9});
const clouds=[];
for(let i=0;i<15;i++){
  const cg=new THREE.Group();
  for(let j=0;j<6;j++){
    const r=4+Math.random()*6;
    const cm=new THREE.Mesh(new THREE.SphereGeometry(r,7,7),cmat);
    cm.position.set((Math.random()-0.5)*15,(Math.random()-0.5)*3,(Math.random()-0.5)*9); cg.add(cm);
  }
  const a=(i/15)*Math.PI*2;
  cg.position.set(Math.cos(a)*210,80+Math.random()*50,Math.sin(a)*210);
  cg.userData.spd=0.007+Math.random()*0.016;
  scene.add(cg); clouds.push(cg);
}

// Controls
const keys={};
let yaw=0,pitch=0,locked=false,flyMode=false;
const flyEl=document.getElementById('flymode');

document.getElementById('overlay').addEventListener('click',()=>renderer.domElement.requestPointerLock());
document.addEventListener('pointerlockchange',()=>{
  locked=document.pointerLockElement===renderer.domElement;
  document.getElementById('overlay').style.display=locked?'none':'flex';
  document.getElementById('crosshair').style.display=locked?'block':'none';
});
document.addEventListener('mousemove',e=>{
  if(!locked) return;
  yaw-=e.movementX*0.0016;
  pitch=Math.max(-1.4,Math.min(1.4,pitch-e.movementY*0.0016));
});
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  if(e.code==='KeyF'){
    flyMode=!flyMode;
    flyEl.textContent=flyMode?'✈️ VOAR':'🚶 ANDAR';
  }
  e.preventDefault&&e.code==='Space'&&e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.code]=false);

const vel=new THREE.Vector3();
const PR=0.5;

function hasCollision(x,y,z){
  for(const c of colliders){
    if(x+PR>c.minX&&x-PR<c.maxX&&
       y+1.75>c.minY&&y<c.maxY&&
       z+PR>c.minZ&&z-PR<c.maxZ) return true;
  }
  return false;
}

const clock=new THREE.Clock();

function animate(){
  requestAnimationFrame(animate);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.elapsedTime;
  wU.uTime.value=t;
  clouds.forEach(c=>{c.position.x+=c.userData.spd;if(c.position.x>300)c.position.x=-300;});

  if(locked){
    const spd=flyMode?22:10;
    const fwd=new THREE.Vector3(-Math.sin(yaw),0,-Math.cos(yaw));
    const right=new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));
    const move=new THREE.Vector3();
    if(keys['KeyW']||keys['ArrowUp'])    move.addScaledVector(fwd,1);
    if(keys['KeyS']||keys['ArrowDown'])  move.addScaledVector(fwd,-1);
    if(keys['KeyA']||keys['ArrowLeft'])  move.addScaledVector(right,-1);
    if(keys['KeyD']||keys['ArrowRight']) move.addScaledVector(right,1);

    if(flyMode){
      if(keys['Space']) move.y+=1;
      if(keys['ShiftLeft']||keys['ShiftRight']) move.y-=1;
      if(move.lengthSq()>0) move.normalize();
      vel.lerp(move.multiplyScalar(spd),0.1);
      camera.position.addScaledVector(vel,dt);
      camera.position.y=Math.max(0.3,camera.position.y);
    } else {
      // horizontal movement with collision
      if(move.lengthSq()>0){move.y=0;move.normalize();}
      vel.x=move.x*spd; vel.z=move.z*spd;
      vel.y-=22*dt;

      const cy=camera.position.y-1.75;
      const nx=camera.position.x+vel.x*dt;
      const nz=camera.position.z+vel.z*dt;
      if(!hasCollision(nx,cy,camera.position.z)) camera.position.x=nx;
      if(!hasCollision(camera.position.x,cy,nz)) camera.position.z=nz;
      camera.position.y+=vel.y*dt;

      const gh=islandH(camera.position.x,camera.position.z);
      const floor=Math.max(gh+1.75,0.3);
      if(camera.position.y<=floor){
        camera.position.y=floor;
        vel.y=0;
        if(keys['Space']) vel.y=8;
      }
    }
    camera.position.x=Math.max(-230,Math.min(230,camera.position.x));
    camera.position.z=Math.max(-230,Math.min(230,camera.position.z));
    camera.rotation.order='YXZ';
    camera.rotation.y=yaw;
    camera.rotation.x=pitch;
  }

  renderer.render(scene,camera);
}
animate();

window.addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
</script>
